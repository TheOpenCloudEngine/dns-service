services:
  # 1. 데이터베이스 (PostgreSQL)
  pdns-db:
    image: postgres:15-alpine
    container_name: pdns-db
    restart: always
    environment:
      POSTGRES_DB: pdns
      POSTGRES_USER: pdns_user
      POSTGRES_PASSWORD: pdns_password
    volumes:
      - ./apps/powerdns/posgres_data_dir:/var/lib/postgresql/data

  # 2. PowerDNS 서버
  pdns-server:
    image: psitrax/powerdns:latest
    container_name: pdns-server
    restart: always
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "8081:8081" # API Port
    environment:
      - PDNS_gpgsql_host=pdns-db
      - PDNS_gpgsql_port=5432
      - PDNS_gpgsql_user=pdns_user
      - PDNS_gpgsql_password=pdns_password
      - PDNS_gpgsql_dbname=pdns
      - PDNS_launch=gpgsql
      - PDNS_api=yes
      - PDNS_api_key=your_secret_api_key # API 키 설정
      - PDNS_webserver=yes
      - PDNS_webserver_address=0.0.0.0
      - PDNS_webserver_allow_from=0.0.0.0/0
    depends_on:
      - pdns-db

  # 3. PowerDNS-Admin (웹 UI)
  pdns-admin:
    image: powerdnsadmin/pda-legacy:latest
    container_name: pdns-admin
    restart: always
    ports:
      - "9191:80" # UI 접속 포트
    environment:
      - SQLALCHEMY_DATABASE_URI=postgresql://pdns_user:pdns_password@pdns-db:5432/pdns
      - GUNICORN_TIMEOUT=60
      - PDNS_API_URL=http://pdns-server:8081/
      - PDNS_API_KEY=your_secret_api_key
    depends_on:
      - pdns-db
      - pdns-server
