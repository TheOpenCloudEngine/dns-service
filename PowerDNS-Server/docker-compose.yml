version: '3.8'

services:
  mysql:
    image: mysql:8.0
    restart: always
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: pdns
      MYSQL_USER: pdns_user
      MYSQL_PASSWORD: pdns_password
      MYSQL_ROOT_PASSWORD: pdns_root_password
    volumes:
      - pdns-mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppdns_root_password"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  pdns-server:
    image: pschiffe/pdns-mysql:alpine
    restart: always
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "15001:8081"
    environment:
      - MYSQL_CLIENT_EXTRA_PARAMS=--skip-ssl
      - PDNS_gmysql_host=mysql
      - PDNS_gmysql_port=3306
      - PDNS_gmysql_user=root
      - PDNS_gmysql_password=pdns_root_password
      - PDNS_gmysql_dbname=pdns
      - PDNS_gmysql_group=pdns
    volumes:
      - ./my.cnf:/etc/my.cnf:ro
    depends_on:
      mysql:
        condition: service_healthy

  pdns-admin:
    image: powerdnsadmin/pda-legacy:v0.4.2
    restart: always
    ports:
      - "15000:80"
    environment:
      - SQLALCHEMY_DATABASE_URI=mysql://pdns_user:pdns_password@mysql:3306/pdns
      - GUNICORN_TIMEOUT=60
      - PDNS_API_URL=http://pdns-server:8081/
      - PDNS_API_KEY=NzR1MnpMVjlqNWhmbWlq
    depends_on:
      mysql:
        condition: service_healthy
      pdns-server:
        condition: service_started

volumes:
  pdns-mysql-data:
