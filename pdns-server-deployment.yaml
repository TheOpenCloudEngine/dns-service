          value: yes
        - name: PDNS_webserver_address
          value: 0.0.0.0
        - name: PDNS_webserver_allow_from
          value: 0.0.0.0/0
        image: psitrax/powerdns:v4.4.1
        imagePullPolicy: ""
        name: pdns-server
        ports:
        - containerPort: 53
          protocol: UDP
        - containerPort: 53
        - containerPort: 8081
        resources: {}
      restartPolicy: Always
      serviceAccountName: ""
