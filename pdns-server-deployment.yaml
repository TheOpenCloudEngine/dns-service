apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: /snap/kompose/19/kompose-linux-amd64 convert -f docker-compose.yml
    kompose.version: 1.21.0 (992df58d8)
  creationTimestamp: null
  labels:
    io.kompose.service: pdns-server
  name: pdns-server
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: pdns-server
  strategy: {}
  template:
    metadata:
      annotations:
        kompose.cmd: /snap/kompose/19/kompose-linux-amd64 convert -f docker-compose.yml
        kompose.version: 1.21.0 (992df58d8)
      creationTimestamp: null
      labels:
        io.kompose.service: pdns-server
    spec:
      containers:
      - env:
        - name: PDNS_api
          value: yes
        - name: PDNS_api_key
          value: your_secret_api_key
        - name: PDNS_gpgsql_dbname
          value: pdns
        - name: PDNS_gpgsql_host
          value: pdns-db
        - name: PDNS_gpgsql_password
          value: pdns_password
        - name: PDNS_gpgsql_port
          value: "5432"
